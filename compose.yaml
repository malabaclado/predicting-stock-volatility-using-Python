version: '3.8'

services:
  # Container 1: The FastAPI API
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./stocks.sqlite:/app/stocks.sqlite
      - ./models:/app/models
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    restart: always

  # Container 2: Jupyter Notebooks
  notebook:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    env_file:
      - .env
    command: >
      jupyter notebook 
      --ip=0.0.0.0 
      --port=8888 
      --no-browser 
      --allow-root 
      --NotebookApp.token='' 
      --NotebookApp.password=''
